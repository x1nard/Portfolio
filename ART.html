<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pretty's portfolio showcasing artwork, videos, and music. Explore visual and audio creations.">
    <title>Portfolio</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            text-align: center;
        }
        header {
            text-align: center;
            padding: 50px 0;
            background-color: #1a1a1a;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
        }
        h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .container {
            width: 90%;
            margin: 0 auto;
            padding: 20px 0;
            max-width: 1200px;
        }
        .media-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            text-align: center;
        }
        .media-item {
            position: relative;
            width: calc(33.333% - 20px);
            max-width: 400px;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }
        .media-item img {
            width: 100%;
            height: auto;
            object-fit: cover;
            transition: opacity 0.3s ease-in-out;
        }
        .media-item:hover img {
            opacity: 0;
        }
        .media-item .hover-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .media-item:hover .hover-img {
            opacity: 1;
        }
        .back-button {
            display: inline-block;
            font-size: 1.2rem;
            color: #fff;
            text-decoration: none;
            background-color: #333;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease-in-out, transform 0.2s ease-in-out;
        }
        .back-button:hover {
            background-color: #555;
            transform: scale(1.05);
        }
        footer {
            background-color: #1a1a1a;
            text-align: center;
            padding: 20px;
            color: #fff;
        }
        @media (max-width: 768px) {
            .media-item {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Art</h1>
</header>

<div class="container">

    <div class="media-grid">
        <div class="media-item">
            <img src="greengrl.png" alt="Illustration of a girl with green tones">
            <img class="hover-img" src="wenlcv.jpg" alt="Hover image of a girl with green tones">
        </div>
        <div class="media-item">
            <img src="y2k brown.png" alt="Y2K style digital artwork with brown tones">
            <img class="hover-img" src="wenlcv1.jpg" alt="Hover image of Y2K style digital artwork">
        </div>
        <div class="media-item">
            <img src="ONA5.png" alt="Experimental glitch-style artwork">
            <img class="hover-img" src="grl.jpg" alt="Hover image of experimental glitch-style artwork">
        </div>
        <div class="media-item">
            <img src="NL.png" alt="No Love artwork with digital textures">
            <img class="hover-img" src="blll.jpg" alt="Hover image of No Love artwork with digital textures">
        </div>
    </div>
<footer>
    <a href="index.html" class="back-button">Back to Home</a>
    <p>&copy; 2026</p>
</footer>
</div>

</body>
</html>
