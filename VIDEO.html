<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio showcasing artwork, videos, and music. Explore visual and audio creations.">
    <title>Vizual</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            text-align: center;
        }
        header {
            text-align: center;
            padding: 50px 0;
            background-color: #1a1a1a;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
        }
        h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .container {
            width: 90%;
            margin: 0 auto;
            padding: 20px 0;
            max-width: 1200px;
        }
        .media-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            text-align: center;
        }
        .media-item {
            width: calc(33.333% - 20px);
            max-width: 400px;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }
.back-button {
    display: inline-block;
    font-size: 1.2rem;
    color: #fff;
    text-decoration: none;
    background-color: #333;
    padding: 10px 20px;
    border-radius: 5px;
    transition: background-color 0.3s ease-in-out, transform 0.2s ease-in-out;
}

.back-button:hover {
    background-color: #555;
    transform: scale(1.05);
}
        /* Эффекты для изображений и видео */
.media-item:hover img, 
.media-item:hover video {
    transform: scale(1.03); /* Меньшее увеличение, чтобы выглядело более плавно */
    box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3); /* Мягкая светлая тень */
}

/* Стандартные стили для медиа */
.media-item img, 
.media-item video {
    width: 100%;
    height: auto;
    object-fit: cover;
    transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out; /* Переходы */
}

/* Стили для аудио */
.media-item audio {
    width: 100%;
    max-width: 600px;
    border: 2px solid transparent; /* Обычная прозрачная рамка */
    transition: border-color 0.3s ease-in-out; /* Плавный переход для рамки */
}

/* Минимальный эффект для аудио */
.media-item:hover audio {
    border-color: #555; /* Легкий цвет рамки при наведении */
}
        .media-item video, .media-item audio {
            max-width: 600px; /* Ограничение для видео и аудио */
        }
        footer {
            background-color: #1a1a1a;
            text-align: center;
            padding: 20px;
            color: #fff;
        }
        /* Адаптивный дизайн */
        @media (max-width: 768px) {
            .media-item {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Vizualizations</h1>
</header>

 <!-- Video Section -->
    <div class="media-grid">
        <div class="media-item">
            <video autoplay muted loop disablePictureInPicture>
                <source src="carti1.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="media-item">
            <video autoplay muted loop disablePictureInPicture>
                <source src="VVV.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="media-item">
            <video autoplay muted loop disablePictureInPicture>
                <source src="travis.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="media-item">
            <video autoplay muted loop disablePictureInPicture>
                <source src="quadro.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="media-item">
            <video autoplay muted loop disablePictureInPicture>
                <source src="yeat.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

<footer>
    <a href="index.html" class="back-button">Back to Home</a>
    <p>&copy; 2026</p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
    // Получаем все элементы видео и устанавливаем mute и автозапуск
    const videos = document.querySelectorAll('video');
    videos.forEach(video => {
        video.muted = true;
        video.play().catch(error => {
            console.error('Видео не смогло автоматически воспроизвестись:', error);
        });
    });
});
</script>

</body>
</html>
