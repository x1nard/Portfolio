<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="s3rrgery's portfolio showcasing beats and loops." />
  <title>s3rrgerylinks</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 50px 0;
      background-color: #1a1a1a;
    }

    h1 {
      font-size: 3rem;
      color: #fff;
      text-transform: uppercase;
      margin: 0;
    }

    .container {
      width: 90%;
      margin: 0 auto;
      padding: 40px 0;
      max-width: 1200px;
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .icon-button {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s, transform 0.2s;
      text-decoration: none;
    }

    .icon-button:hover {
      background-color: #333;
      transform: scale(1.1);
    }

    .icon-button img {
      width: 40px;
      height: 40px;
    }

    footer {
      background-color: #1a1a1a;
      text-align: center;
      padding: 20px;
      color: #fff;
    }

    .back-button {
      display: inline-block;
      font-size: 1.2rem;
      color: #fff;
      text-decoration: none;
      background-color: #333;
      padding: 10px 20px;
      border-radius: 12px;
      transition: background-color 0.3s ease-in-out, transform 0.2s ease-in-out;
    }

    .back-button:hover {
      background-color: #555;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <header>
    <h1>links</h1>
  </header>

  <div class="container">
    <a href="https://www.tiktok.com/@s3rrgery?_r=1&_t=ZS-95e5SgNzWW0" target="_blank" class="icon-button" aria-label="Tiktok">
      <img src="tt.png" alt="Tiktok Icon" />
    </a>

    <a href="https://www.youtube.com/@s3rrgery" target="_blank" class="icon-button" aria-label="YouTube">
      <img src="pngegg.png" alt="YouTube Icon" />
    </a>
  </div>

  <footer>
    <a href="index.html" class="back-button">Back to Home</a>
    <p>&copy; 2026</p>
  </footer>

</body>
</html>
